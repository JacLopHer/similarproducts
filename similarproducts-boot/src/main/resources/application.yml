server:
  port: 5000

spring:
  application:
    name: similarproducts
  profiles:
    active: dev

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

external-api:
  base-url: http://localhost:3001
  endpoints:
    similar-ids: /product/{productId}/similarids
    product-detail: /product/{productId}
  timeout:
    connect-ms: 5000
    read-ms: 10000

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: INFO
    org.inditex.similarproducts: DEBUG

---
spring:
  config:
    activate:
      on-profile: test

logging:
  level:
    root: WARN
    org.inditex.similarproducts: INFO

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: INFO
    org.inditex.similarproducts: INFO

