server:
  port: 5000

spring:
  application:
    name: similarproducts
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutos en ms

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Configuración de caché
cache:
  ttl:
    seconds: 600  # 10 minutos en producción por defecto

# Configuración de APIs externas con resiliencia
external-api:
  base-url: http://localhost:3001
  endpoints:
    similar-ids: /product/{productId}/similarids
    product-detail: /product/{productId}
  timeout:
    # Timeout de conexión: 5 segundos
    connect-ms: 5000
    # Timeout de lectura: 10 segundos
    read-ms: 10000
  # Pool de conexiones (configurado en HttpClientConfig)
  connection-pool:
    max-connections: 50
    pending-acquire-max: 100
    acquire-timeout-ms: 5000
    max-idle-time-ms: 30000
  # Reintentos
  retry:
    max-attempts: 2
    retry-delay-ms: 100

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: INFO
    com.example.similarproducts: DEBUG
    org.springframework.web.reactive.function.client: DEBUG
    reactor.netty.http.client: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

cache:
  ttl:
    seconds: 300  # 5 minutos en desarrollo


---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: INFO
    com.example.similarproducts: INFO
    org.springframework.web.reactive.function.client: WARN
    reactor.netty.http.client: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"

cache:
  ttl:
    seconds: 600  # 10 minutos en producción

