server:
  port: 5000

spring:
  application:
    name: similarproducts
  profiles:
    active: dev

  reactor:
    debug-agent:
      enabled: true
    netty:
      resources:
        max-threads: 200
        max-connections: 100
      pool:
        max-connections: 100
        acquire-timeout: 5000ms
        max-idle-time: 30000ms
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes in ms

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Cache configuration
cache:
  ttl:
    seconds: 600  # 10 minutes in production by default

# External APIs configuration with resilience
external-api:
  base-url: ${EXTERNAL_API_BASE_URL:http://localhost:3001}
  endpoints:
    similar-ids: /product/{productId}/similarids
    product-detail: /product/{productId}
  timeout:
    # Connection timeout: 5 seconds
    connect-ms: 5000
    # Read timeout: 10 seconds
    read-ms: 10000
  # Connection pool (configured in HttpClientConfig)
  connection-pool:
    max-connections: 50
    pending-acquire-max: 100
    acquire-timeout-ms: 5000
    max-idle-time-ms: 30000
  # Retries
  retry:
    max-attempts: 2
    retry-delay-ms: 100

---
spring:
  config:
    activate:
      on-profile: dev
  
  reactor:
    debug-agent:
      enabled: true

logging:
  level:
    root: INFO
    com.example.similarproducts: DEBUG
    org.springframework.web.reactive.function.client: DEBUG
    reactor.netty.http.client: DEBUG
    reactor: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

cache:
  ttl:
    seconds: 300  # 5 minutes in development


---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: INFO
    com.example.similarproducts: INFO
    org.springframework.web.reactive.function.client: WARN
    reactor.netty.http.client: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"

cache:
  ttl:
    seconds: 600  # 10 minutes in production

