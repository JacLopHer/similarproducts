name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with coverage
        run: mvn clean verify -DskipTests=false

      - name: Generate coverage report
        run: mvn jacoco:report-aggregate

      - name: Check coverage threshold (70%)
        run: |
          COVERAGE=$(grep -oP 'Line:</td><td class="bar">\K[^<]*' similarproducts-boot/target/site/jacoco-aggregate/index.html | head -1)
          echo "Coverage: $COVERAGE"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "Coverage is below 70% threshold!"
            exit 1
          fi

      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco*/'
