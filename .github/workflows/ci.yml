name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with coverage
        run: mvn clean verify -DskipTests=false

      - name: Generate coverage report
        run: mvn jacoco:report-aggregate

      - name: Check coverage threshold (70%)
        run: |
          if [ -f "similarproducts-boot/target/site/jacoco-aggregate/index.html" ]; then
            COVERAGE=$(grep -oP 'Total.*?<span class="bar">\K[0-9.]+' similarproducts-boot/target/site/jacoco-aggregate/index.html | head -1 || echo "0")
            COVERAGE=${COVERAGE%\%}
            echo "Coverage: $COVERAGE%"
            COVERAGE_INT=${COVERAGE%.*}
            if [ "$COVERAGE_INT" -lt 70 ]; then
              echo "Coverage is $COVERAGE_INT%, below 70% threshold!"
              exit 1
            else
              echo "✅ Coverage threshold passed: $COVERAGE%"
            fi
          else
            echo "Warning: JaCoCo report not found"
          fi

      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco*/'
